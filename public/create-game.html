<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Game - PlaySculpt Studio</title>
    <style>
      body { margin: 0; font-family: Verdana, sans-serif; background: #dce8ff; color: #1f2d46; }
      .wrap { max-width: 1360px; margin: 0 auto; padding: 12px; }
      .layout { display: grid; grid-template-columns: 360px 1fr; gap: 12px; }
      .card { background:#f8fbff; border:1px solid #97add7; border-radius:4px; padding: 12px; }
      .btn { border:1px solid #2e5cb0; background:linear-gradient(#75a0ef,#4f7fd9); color:#fff; padding:8px 12px; cursor:pointer; margin-right:6px; margin-bottom:6px; border-radius:3px; }
      .btn[data-active="true"] { box-shadow: inset 0 0 0 2px #ffffff; filter: saturate(1.2); }
      input, textarea, select { width:100%; box-sizing:border-box; border:1px solid #9db2dc; border-radius:3px; padding:8px; margin-top:4px; margin-bottom:8px; }
      textarea { min-height: 80px; }
      #studio { width:100%; height:700px; border:1px solid #9db2dc; background:#d1e1ff; }
      .tool-grid { display:grid; grid-template-columns: repeat(2,minmax(100px,1fr)); gap:6px; }
      .increment-grid { display:grid; grid-template-columns:repeat(2,minmax(100px,1fr)); gap:8px; }
      .muted { color:#526188; font-size:13px; }
      .legend { margin-top:6px; border:1px solid #ceddfa; background:#eff5ff; padding:8px; border-radius:4px; }
      @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } #studio { height: 500px; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div style="margin-bottom:8px;">
        <button class="btn" id="dashboardBtn" type="button">Dashboard</button>
        <button class="btn" id="myGamesBtn" type="button">My Games</button>
      </div>
      <div id="errorBox" style="color:#8f1f1f"></div>
      <div id="statusBox" class="muted"></div>

      <div class="layout">
        <section class="card">
          <h3 style="margin-top:0">Game Settings</h3>
          <label>Title<input id="titleInput" maxlength="80" /></label>
          <label>Description<textarea id="descriptionInput" maxlength="1000"></textarea></label>
          <label>Thumbnail URL<input id="thumbnailInput" placeholder="https://..." /></label>
          <label><input id="publicCheckbox" type="checkbox" checked /> Public game</label>

          <h3>Studio Tools</h3>
          <div class="tool-grid">
            <button class="btn" type="button" data-tool="select">Select (1)</button>
            <button class="btn" type="button" data-tool="move">Move (2)</button>
            <button class="btn" type="button" data-tool="scale">Scale (3)</button>
            <button class="btn" type="button" data-tool="rotate">Rotate (4)</button>
          </div>

          <div class="increment-grid">
            <label>Move Increment<input id="moveIncrementInput" type="number" min="0.05" step="0.05" value="0.25" /></label>
            <label>Scale Increment<input id="scaleIncrementInput" type="number" min="0.05" step="0.05" value="0.1" /></label>
            <label>Rotate Increment (°)<input id="rotateIncrementInput" type="number" min="1" step="1" value="15" /></label>
            <label>Select Drag Height<input id="selectHeightInput" type="number" min="0.1" step="0.1" value="0.5" /></label>
          </div>

          <label>Primitive
            <select id="primitiveSelect">
              <option value="box">Box</option>
              <option value="sphere">Sphere</option>
              <option value="cylinder">Cylinder</option>
              <option value="cone">Cone</option>
              <option value="torus">Torus</option>
            </select>
          </label>
          <label>Object Color <input id="colorInput" type="color" value="#4f7fd9" /></label>

          <button class="btn" id="addObjectBtn" type="button">Add Object</button>
          <button class="btn" id="duplicateBtn" type="button">Duplicate Selected</button>
          <button class="btn" id="deleteBtn" type="button">Delete Selected</button>
          <button class="btn" id="randomColorBtn" type="button">Randomize Color</button>

          <label>Lighting Preset
            <select id="lightingSelect">
              <option value="day">Day</option>
              <option value="sunset">Sunset</option>
              <option value="night">Night</option>
            </select>
          </label>
          <button class="btn" id="focusBtn" type="button">Focus Selected</button>
          <button class="btn" id="autoArrangeBtn" type="button">Auto Arrange</button>
          <button class="btn" id="saveDraftBtn" type="button">Save Draft (Local)</button>
          <button class="btn" id="loadDraftBtn" type="button">Load Draft (Local)</button>

          <div class="legend muted">
            <div><strong>Editor Help</strong></div>
            <div>• Drag selected block in Select mode with collisions and no clipping.</div>
            <div>• Move/Scale/Rotate use custom on-screen handles (no external transform controls).</div>
            <div>• Keybinds: 1 Select, 2 Move, 3 Scale, 4 Rotate.</div>
          </div>

          <button class="btn" id="saveGameBtn" type="button">Save Game</button>
        </section>

        <section class="card">
          <h3 style="margin-top:0">3D Studio</h3>
          <div id="studio"></div>
          <div class="muted">Active tool: <strong id="activeToolText">select</strong> | Objects: <span id="objectCount">0</span></div>
        </section>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      const state = {
        mode: 'create',
        gameId: '',
        activeTool: 'select',
        selectedId: '',
        dragging: false,
        dragStart: null,
        draftKey: 'playsculpt.studio.draft',
        transformAxis: '',
        activeHandle: null,
      };

      const objects = [];
      const tempBox = new THREE.Box3();
      const tempBox2 = new THREE.Box3();
      const tempVec = new THREE.Vector3();
      const worldUp = new THREE.Vector3(0, 1, 0);
      let camera;
      let scene;
      let renderer;
      let controls;
      let raycaster;
      let pointer;
      let ambient;
      let sun;
      let ground;
      let selectionHelper;
      let transformGizmo;
      const handleMap = new Map();

      const studio = document.getElementById('studio');
      const errorBox = document.getElementById('errorBox');
      const statusBox = document.getElementById('statusBox');

      function setError(text) { errorBox.textContent = text || ''; }
      function setStatus(text) { statusBox.textContent = text || ''; }

      async function fetchJSON(url, options = {}) {
        const response = await fetch(url, options);
        const data = await response.json().catch(() => ({}));
        if (response.status === 401) {
          window.location.href = '/';
          return null;
        }
        if (!response.ok) throw new Error(data.error || 'Request failed.');
        return data;
      }

      function updateObjectCount() {
        document.getElementById('objectCount').textContent = objects.length;
      }

      function getMoveIncrement() {
        return Math.max(0.05, Number(document.getElementById('moveIncrementInput').value) || 0.25);
      }

      function getScaleIncrement() {
        return Math.max(0.05, Number(document.getElementById('scaleIncrementInput').value) || 0.1);
      }

      function getRotateIncrementRad() {
        const degrees = Math.max(1, Number(document.getElementById('rotateIncrementInput').value) || 15);
        return THREE.MathUtils.degToRad(degrees);
      }

      function getSelectHeight() {
        return Math.max(0.1, Number(document.getElementById('selectHeightInput').value) || 0.5);
      }

      function setTool(tool) {
        state.activeTool = tool;
        state.transformAxis = '';
        document.getElementById('activeToolText').textContent = tool;
        document.querySelectorAll('[data-tool]').forEach((btn) => {
          btn.dataset.active = String(btn.dataset.tool === tool);
        });
        updateSelectionVisuals();
      }

      function createGeometry(type) {
        if (type === 'sphere') return new THREE.SphereGeometry(0.5, 24, 24);
        if (type === 'cylinder') return new THREE.CylinderGeometry(0.45, 0.45, 1, 24);
        if (type === 'cone') return new THREE.ConeGeometry(0.5, 1, 20);
        if (type === 'torus') return new THREE.TorusGeometry(0.4, 0.16, 16, 40);
        return new THREE.BoxGeometry(1, 1, 1);
      }

      function quantize(value, increment) {
        return Math.round(value / increment) * increment;
      }

      function addObject(payload = null) {
        const primitive = payload?.primitive || document.getElementById('primitiveSelect').value;
        const color = payload?.color || document.getElementById('colorInput').value;
        const geometry = createGeometry(primitive);
        const material = new THREE.MeshStandardMaterial({ color });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(payload?.position?.x ?? (Math.random() * 2 - 1), payload?.position?.y ?? 0.5, payload?.position?.z ?? (Math.random() * 2 - 1));
        mesh.rotation.set(payload?.rotation?.x || 0, payload?.rotation?.y || 0, payload?.rotation?.z || 0);
        mesh.scale.set(payload?.scale?.x || 1, payload?.scale?.y || 1, payload?.scale?.z || 1);

        const id = payload?.id || `obj_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
        mesh.userData = { id, primitive, startPosition: mesh.position.clone(), startScale: mesh.scale.clone(), startRotation: mesh.rotation.clone() };
        scene.add(mesh);
        objects.push(mesh);
        selectObject(id);
        updateObjectCount();
      }

      function getSelectedObject() {
        return objects.find((item) => item.userData.id === state.selectedId) || null;
      }

      function updateSelectionVisuals() {
        const selected = getSelectedObject();
        objects.forEach((mesh) => {
          mesh.material.emissive = mesh.material.emissive || new THREE.Color(0x000000);
          mesh.material.emissive.set(mesh.userData.id === state.selectedId ? 0x203860 : 0x000000);
        });

        if (!selected) {
          selectionHelper.visible = false;
          transformGizmo.visible = false;
          return;
        }

        selectionHelper.visible = true;
        selectionHelper.setFromObject(selected);
        transformGizmo.visible = state.activeTool !== 'select';
        transformGizmo.position.copy(selected.position);
        transformGizmo.rotation.set(0, selected.rotation.y, 0);
        transformGizmo.scale.setScalar(Math.max(0.7, camera.position.distanceTo(selected.position) * 0.12));
        transformGizmo.children.forEach((child) => {
          const mode = child.userData?.mode || '';
          child.visible = state.activeTool !== 'select' && mode === state.activeTool;
        });
      }

      function selectObject(id) {
        state.selectedId = id || '';
        updateSelectionVisuals();
      }

      function pointerToNdc(clientX, clientY) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      }

      function pickObject(clientX, clientY) {
        pointerToNdc(clientX, clientY);
        raycaster.setFromCamera(pointer, camera);
        const hit = raycaster.intersectObjects(objects, false)[0];
        return hit ? hit.object : null;
      }

      function pickHandle(clientX, clientY) {
        if (!transformGizmo.visible) return null;
        pointerToNdc(clientX, clientY);
        raycaster.setFromCamera(pointer, camera);
        const hits = raycaster.intersectObjects([...handleMap.keys()], false);
        const hit = hits.find((entry) => handleMap.has(entry.object));
        return hit ? handleMap.get(hit.object) : null;
      }

      function collidesWithOthers(mesh) {
        tempBox.setFromObject(mesh);
        for (const other of objects) {
          if (other === mesh) continue;
          tempBox2.setFromObject(other);
          if (tempBox.intersectsBox(tempBox2)) return true;
        }
        return false;
      }

      function moveWithCollision(mesh, targetPosition) {
        const original = mesh.position.clone();
        const minY = tempBox.setFromObject(mesh).getSize(tempVec).y * 0.5;
        mesh.position.y = Math.max(minY, targetPosition.y);

        mesh.position.x = targetPosition.x;
        if (collidesWithOthers(mesh)) mesh.position.x = original.x;

        mesh.position.z = targetPosition.z;
        if (collidesWithOthers(mesh)) mesh.position.z = original.z;

        if (mesh.position.y !== original.y && collidesWithOthers(mesh)) {
          mesh.position.y = original.y;
        }
      }

      function planeDragTarget(clientX, clientY, yLevel) {
        pointerToNdc(clientX, clientY);
        raycaster.setFromCamera(pointer, camera);
        const dragPlane = new THREE.Plane(worldUp, -yLevel);
        const hitPoint = new THREE.Vector3();
        const hasHit = raycaster.ray.intersectPlane(dragPlane, hitPoint);
        return hasHit ? hitPoint : null;
      }

      function deleteSelected() {
        const selected = getSelectedObject();
        if (!selected) return;
        scene.remove(selected);
        const idx = objects.findIndex((o) => o.userData.id === selected.userData.id);
        if (idx >= 0) objects.splice(idx, 1);
        selectObject('');
        updateObjectCount();
      }

      function duplicateSelected() {
        const selected = getSelectedObject();
        if (!selected) return;
        addObject({
          primitive: selected.userData.primitive,
          color: `#${selected.material.color.getHexString()}`,
          position: { x: selected.position.x + 0.6, y: selected.position.y, z: selected.position.z + 0.6 },
          rotation: selected.rotation,
          scale: selected.scale,
        });
      }

      function randomizeSelectedColor() {
        const selected = getSelectedObject();
        if (!selected) return;
        selected.material.color.set(Math.random() * 0xffffff);
      }

      function setLightingPreset(name) {
        if (name === 'sunset') {
          scene.background = new THREE.Color(0xfac08e);
          ambient.intensity = 0.6;
          sun.intensity = 0.9;
          sun.color.set(0xffb777);
        } else if (name === 'night') {
          scene.background = new THREE.Color(0x1a2745);
          ambient.intensity = 0.35;
          sun.intensity = 0.4;
          sun.color.set(0x90a8ff);
        } else {
          scene.background = new THREE.Color(0xd1e1ff);
          ambient.intensity = 0.75;
          sun.intensity = 1.1;
          sun.color.set(0xffffff);
        }
      }

      function focusSelected() {
        const selected = getSelectedObject();
        if (!selected) return;
        controls.target.copy(selected.position);
      }

      function autoArrange() {
        const radius = Math.max(2, objects.length * 0.35);
        objects.forEach((mesh, index) => {
          const t = (index / Math.max(1, objects.length)) * Math.PI * 2;
          mesh.position.set(Math.cos(t) * radius, 0.5, Math.sin(t) * radius);
        });
        updateSelectionVisuals();
      }

      function serializeScene() {
        return {
          objects: objects.map((mesh) => ({
            id: mesh.userData.id,
            primitive: mesh.userData.primitive,
            color: `#${mesh.material.color.getHexString()}`,
            position: { x: mesh.position.x, y: mesh.position.y, z: mesh.position.z },
            rotation: { x: mesh.rotation.x, y: mesh.rotation.y, z: mesh.rotation.z },
            scale: { x: mesh.scale.x, y: mesh.scale.y, z: mesh.scale.z },
          })),
        };
      }

      function loadScene(data) {
        while (objects.length) {
          const obj = objects.pop();
          scene.remove(obj);
        }

        const list = Array.isArray(data?.objects) ? data.objects : [];
        list.forEach((item) => addObject(item));
        selectObject('');
        updateObjectCount();
      }

      async function saveGame() {
        try {
          setError('');
          const payload = {
            id: state.gameId,
            title: document.getElementById('titleInput').value || '',
            description: document.getElementById('descriptionInput').value || '',
            thumbnail: document.getElementById('thumbnailInput').value || '',
            isPublic: document.getElementById('publicCheckbox').checked,
            studioState: serializeScene(),
          };

          const endpoint = state.mode === 'edit' ? '/api/games/update' : '/api/games/create';
          const result = await fetchJSON(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          if (result?.game?.id) {
            state.mode = 'edit';
            state.gameId = result.game.id;
          }

          setStatus(result?.message || 'Game saved.');
        } catch (error) {
          setError(error.message);
        }
      }

      async function loadExistingGame(id) {
        const result = await fetchJSON(`/api/games/${encodeURIComponent(id)}`);
        if (!result || !result.game) return;
        if (!result.isCreator) throw new Error('Only creator can edit this game.');

        state.mode = 'edit';
        state.gameId = result.game.id;
        document.getElementById('titleInput').value = result.game.title || '';
        document.getElementById('descriptionInput').value = result.game.description || '';
        document.getElementById('thumbnailInput').value = result.game.thumbnail || '';
        document.getElementById('publicCheckbox').checked = Boolean(result.game.public);
        loadScene(result.game.studioState || { objects: [] });
      }

      function buildTransformGizmo() {
        transformGizmo = new THREE.Group();
        transformGizmo.visible = false;
        scene.add(transformGizmo);

        const axes = [
          { axis: 'x', color: 0xff5a5a, dir: new THREE.Vector3(1, 0, 0) },
          { axis: 'y', color: 0x53e27e, dir: new THREE.Vector3(0, 1, 0) },
          { axis: 'z', color: 0x5a7dff, dir: new THREE.Vector3(0, 0, 1) },
        ];

        axes.forEach(({ axis, color, dir }) => {
          const line = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1.2, 12), new THREE.MeshBasicMaterial({ color }));
          line.position.copy(dir.clone().multiplyScalar(0.6));
          if (axis === 'x') line.rotation.z = -Math.PI / 2;
          if (axis === 'z') line.rotation.x = Math.PI / 2;
          line.userData.mode = 'move';
          transformGizmo.add(line);

          const handle = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.16, 0.16), new THREE.MeshBasicMaterial({ color }));
          handle.position.copy(dir.clone().multiplyScalar(1.25));
          handle.userData.mode = 'move';
          transformGizmo.add(handle);
          handleMap.set(handle, { type: 'move', axis, direction: 1 });

          const scaleHandle = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.22, 0.22), new THREE.MeshBasicMaterial({ color: color + 0x222222 }));
          scaleHandle.position.copy(dir.clone().multiplyScalar(1.65));
          scaleHandle.userData.mode = 'scale';
          transformGizmo.add(scaleHandle);
          handleMap.set(scaleHandle, { type: 'scale', axis, direction: 1 });
        });

        const rotateY = new THREE.Mesh(new THREE.TorusGeometry(1.4, 0.04, 12, 60), new THREE.MeshBasicMaterial({ color: 0xf3d34a }));
        rotateY.rotation.x = Math.PI / 2;
        rotateY.userData.mode = 'rotate';
        transformGizmo.add(rotateY);
        handleMap.set(rotateY, { type: 'rotate', axis: 'y', direction: 1 });
      }

      function applyTransformFromDrag(selected, dx, dy) {
        if (!selected || !state.transformAxis) return;

        if (state.activeTool === 'move') {
          const increment = getMoveIncrement();
          const step = quantize((dx + dy) * 0.04, increment);
          const target = selected.position.clone();
          target[state.transformAxis] += step;
          moveWithCollision(selected, target);
        } else if (state.activeTool === 'scale') {
          const increment = getScaleIncrement();
          const delta = quantize((dx - dy) * 0.02, increment);
          const axis = state.transformAxis;
          const direction = state.activeHandle?.direction || 1;
          const previousScale = selected.scale[axis];
          const next = Math.max(0.2, quantize(previousScale + delta, increment));
          const appliedDelta = next - previousScale;
          selected.scale[axis] = next;
          selected.position[axis] += (appliedDelta * direction) / 2;
          const minY = tempBox.setFromObject(selected).getSize(tempVec).y * 0.5;
          selected.position.y = Math.max(minY, selected.position.y);
          if (collidesWithOthers(selected)) {
            selected.scale[axis] = previousScale;
            selected.position[axis] -= (appliedDelta * direction) / 2;
          }
        } else if (state.activeTool === 'rotate') {
          const increment = getRotateIncrementRad();
          const delta = quantize((dx - dy) * 0.02, increment);
          selected.rotation[state.transformAxis] = quantize(selected.rotation[state.transformAxis] + delta, increment);
        }
      }

      function setupStudio() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd1e1ff);

        camera = new THREE.PerspectiveCamera(55, studio.clientWidth / studio.clientHeight, 0.1, 1000);
        camera.position.set(6, 5.5, 6.5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(studio.clientWidth, studio.clientHeight);
        studio.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.8, 0);

        ambient = new THREE.AmbientLight(0xffffff, 0.75);
        scene.add(ambient);
        sun = new THREE.DirectionalLight(0xffffff, 1.1);
        sun.position.set(6, 10, 4);
        scene.add(sun);

        ground = new THREE.Mesh(
          new THREE.PlaneGeometry(60, 60),
          new THREE.MeshStandardMaterial({ color: 0xbfd0ed, roughness: 0.9 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        selectionHelper = new THREE.BoxHelper(new THREE.Mesh(), 0xffe070);
        selectionHelper.visible = false;
        scene.add(selectionHelper);
        buildTransformGizmo();

        raycaster = new THREE.Raycaster();
        pointer = new THREE.Vector2();

        renderer.domElement.addEventListener('pointerdown', (event) => {
          const selected = getSelectedObject();
          const handle = pickHandle(event.clientX, event.clientY);

          if (handle && selected) {
            const expectedType = state.activeTool;
            if (handle.type === expectedType || (expectedType === 'rotate' && handle.type === 'rotate')) {
              state.transformAxis = handle.axis;
              state.activeHandle = handle;
              state.dragging = true;
              state.dragStart = { x: event.clientX, y: event.clientY };
              controls.enabled = false;
              selected.userData.startScale.copy(selected.scale);
              selected.userData.startPosition.copy(selected.position);
              return;
            }
          }

          const picked = pickObject(event.clientX, event.clientY);
          if (picked) {
            selectObject(picked.userData.id);
            if (state.activeTool === 'select') {
              state.dragging = true;
              state.dragStart = { x: event.clientX, y: event.clientY };
              controls.enabled = false;
            }
          } else {
            selectObject('');
          }
        });

        renderer.domElement.addEventListener('pointerup', () => {
          state.dragging = false;
          state.dragStart = null;
          state.transformAxis = '';
          state.activeHandle = null;
          controls.enabled = true;
        });

        renderer.domElement.addEventListener('pointermove', (event) => {
          if (!state.dragging) return;
          const selected = getSelectedObject();
          if (!selected) return;

          const dx = event.clientX - state.dragStart.x;
          const dy = event.clientY - state.dragStart.y;
          state.dragStart = { x: event.clientX, y: event.clientY };

          if (state.activeTool === 'select') {
            const hitPoint = planeDragTarget(event.clientX, event.clientY, getSelectHeight());
            if (!hitPoint) return;
            moveWithCollision(selected, new THREE.Vector3(
              quantize(hitPoint.x, getMoveIncrement()),
              getSelectHeight(),
              quantize(hitPoint.z, getMoveIncrement())
            ));
          } else {
            applyTransformFromDrag(selected, dx, dy);
          }

          updateSelectionVisuals();
        });

        window.addEventListener('resize', () => {
          if (!renderer) return;
          camera.aspect = studio.clientWidth / studio.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(studio.clientWidth, studio.clientHeight);
        });
      }

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        updateSelectionVisuals();
        renderer.render(scene, camera);
      }

      document.querySelectorAll('[data-tool]').forEach((button) => {
        button.addEventListener('click', () => setTool(button.dataset.tool || 'select'));
      });

      document.addEventListener('keydown', (event) => {
        if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName)) return;
        if (event.key === '1') setTool('select');
        if (event.key === '2') setTool('move');
        if (event.key === '3') setTool('scale');
        if (event.key === '4') setTool('rotate');
      });

      document.getElementById('addObjectBtn').addEventListener('click', () => addObject());
      document.getElementById('deleteBtn').addEventListener('click', deleteSelected);
      document.getElementById('duplicateBtn').addEventListener('click', duplicateSelected);
      document.getElementById('randomColorBtn').addEventListener('click', randomizeSelectedColor);
      document.getElementById('lightingSelect').addEventListener('change', (event) => setLightingPreset(event.target.value));
      document.getElementById('focusBtn').addEventListener('click', focusSelected);
      document.getElementById('autoArrangeBtn').addEventListener('click', autoArrange);
      document.getElementById('saveGameBtn').addEventListener('click', saveGame);

      document.getElementById('saveDraftBtn').addEventListener('click', () => {
        localStorage.setItem(state.draftKey, JSON.stringify(serializeScene()));
        setStatus('Draft saved locally.');
      });
      document.getElementById('loadDraftBtn').addEventListener('click', () => {
        const raw = localStorage.getItem(state.draftKey);
        if (!raw) return setStatus('No local draft found.');
        try {
          loadScene(JSON.parse(raw));
          setStatus('Draft loaded.');
        } catch {
          setError('Draft is corrupted.');
        }
      });

      document.getElementById('dashboardBtn').addEventListener('click', () => { window.location.href = '/dashboard.html'; });
      document.getElementById('myGamesBtn').addEventListener('click', () => { window.location.href = '/my-games.html'; });

      async function init() {
        await fetchJSON('/api/me');
        setupStudio();

        const params = new URLSearchParams(window.location.search);
        const editId = params.get('id');
        if (editId) {
          await loadExistingGame(editId);
          setStatus('Loaded game for editing.');
        } else {
          addObject();
        }
        setTool('select');
      }

      init().catch((error) => setError(error.message));
      animate();
    </script>
  </body>
</html>
