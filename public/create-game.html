<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Game - PlaySculpt Studio</title>
    <style>
      body { margin: 0; font-family: Verdana, sans-serif; background: #dce8ff; color: #1f2d46; }
      .wrap { max-width: 1300px; margin: 0 auto; padding: 12px; }
      .layout { display: grid; grid-template-columns: 340px 1fr; gap: 12px; }
      .card { background:#f8fbff; border:1px solid #97add7; border-radius:4px; padding: 12px; }
      .btn { border:1px solid #2e5cb0; background:linear-gradient(#75a0ef,#4f7fd9); color:#fff; padding:8px 12px; cursor:pointer; margin-right:6px; margin-bottom:6px; }
      input, textarea, select { width:100%; box-sizing:border-box; border:1px solid #9db2dc; border-radius:3px; padding:8px; margin-top:4px; margin-bottom:8px; }
      textarea { min-height: 80px; }
      #studio { width:100%; height:680px; border:1px solid #9db2dc; background:#d1e1ff; }
      .tool-grid { display:grid; grid-template-columns: repeat(2,minmax(100px,1fr)); gap:6px; }
      .muted { color:#526188; font-size:13px; }
      @media (max-width: 980px) { .layout { grid-template-columns: 1fr; } #studio { height: 460px; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div style="margin-bottom:8px;">
        <button class="btn" id="dashboardBtn" type="button">Dashboard</button>
        <button class="btn" id="myGamesBtn" type="button">My Games</button>
      </div>
      <div id="errorBox" style="color:#8f1f1f"></div>
      <div id="statusBox" class="muted"></div>

      <div class="layout">
        <section class="card">
          <h3 style="margin-top:0">Game Settings</h3>
          <label>Title<input id="titleInput" maxlength="80" /></label>
          <label>Description<textarea id="descriptionInput" maxlength="1000"></textarea></label>
          <label>Thumbnail URL<input id="thumbnailInput" placeholder="https://..." /></label>
          <label><input id="publicCheckbox" type="checkbox" checked /> Public game</label>

          <h3>Studio Tools</h3>
          <div class="tool-grid">
            <button class="btn" type="button" data-tool="select">Select</button>
            <button class="btn" type="button" data-tool="move">Move</button>
            <button class="btn" type="button" data-tool="rotate">Rotate</button>
            <button class="btn" type="button" data-tool="scale">Scale</button>
          </div>

          <label>Primitive
            <select id="primitiveSelect">
              <option value="box">Box</option>
              <option value="sphere">Sphere</option>
              <option value="cylinder">Cylinder</option>
              <option value="cone">Cone</option>
              <option value="torus">Torus</option>
            </select>
          </label>
          <label>Object Color <input id="colorInput" type="color" value="#4f7fd9" /></label>

          <button class="btn" id="addObjectBtn" type="button">Add Object</button>
          <button class="btn" id="duplicateBtn" type="button">Duplicate Selected</button>
          <button class="btn" id="deleteBtn" type="button">Delete Selected</button>
          <button class="btn" id="randomColorBtn" type="button">Randomize Color</button>

          <label>Lighting Preset
            <select id="lightingSelect">
              <option value="day">Day</option>
              <option value="sunset">Sunset</option>
              <option value="night">Night</option>
            </select>
          </label>
          <button class="btn" id="focusBtn" type="button">Focus Selected</button>
          <button class="btn" id="autoArrangeBtn" type="button">Auto Arrange</button>
          <button class="btn" id="saveDraftBtn" type="button">Save Draft (Local)</button>
          <button class="btn" id="loadDraftBtn" type="button">Load Draft (Local)</button>

          <p class="muted">Controls: click object to select. Drag mouse on studio to edit using selected tool. No grid is used.</p>

          <button class="btn" id="saveGameBtn" type="button">Save Game</button>
        </section>

        <section class="card">
          <h3 style="margin-top:0">3D Studio</h3>
          <div id="studio"></div>
          <div class="muted">Active tool: <strong id="activeToolText">select</strong> | Objects: <span id="objectCount">0</span></div>
        </section>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      const state = {
        mode: 'create',
        gameId: '',
        activeTool: 'select',
        selectedId: '',
        dragging: false,
        dragStart: null,
        draftKey: 'playsculpt.studio.draft',
      };

      const objects = [];
      let camera;
      let scene;
      let renderer;
      let controls;
      let raycaster;
      let pointer;
      let ambient;
      let sun;

      const studio = document.getElementById('studio');
      const errorBox = document.getElementById('errorBox');
      const statusBox = document.getElementById('statusBox');

      function setError(text) { errorBox.textContent = text || ''; }
      function setStatus(text) { statusBox.textContent = text || ''; }

      async function fetchJSON(url, options = {}) {
        const response = await fetch(url, options);
        const data = await response.json().catch(() => ({}));
        if (response.status === 401) {
          window.location.href = '/';
          return null;
        }
        if (!response.ok) throw new Error(data.error || 'Request failed.');
        return data;
      }

      function updateObjectCount() {
        document.getElementById('objectCount').textContent = objects.length;
      }

      function setTool(tool) {
        state.activeTool = tool;
        document.getElementById('activeToolText').textContent = tool;
      }

      function createGeometry(type) {
        if (type === 'sphere') return new THREE.SphereGeometry(0.5, 24, 24);
        if (type === 'cylinder') return new THREE.CylinderGeometry(0.45, 0.45, 1, 24);
        if (type === 'cone') return new THREE.ConeGeometry(0.5, 1, 20);
        if (type === 'torus') return new THREE.TorusGeometry(0.4, 0.16, 16, 40);
        return new THREE.BoxGeometry(1, 1, 1);
      }

      function addObject(payload = null) {
        const primitive = payload?.primitive || document.getElementById('primitiveSelect').value;
        const color = payload?.color || document.getElementById('colorInput').value;
        const geometry = createGeometry(primitive);
        const material = new THREE.MeshStandardMaterial({ color });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(payload?.position?.x ?? (Math.random() * 2 - 1), payload?.position?.y ?? 0.5, payload?.position?.z ?? (Math.random() * 2 - 1));
        mesh.rotation.set(payload?.rotation?.x || 0, payload?.rotation?.y || 0, payload?.rotation?.z || 0);
        mesh.scale.set(payload?.scale?.x || 1, payload?.scale?.y || 1, payload?.scale?.z || 1);

        const id = payload?.id || `obj_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
        mesh.userData = { id, primitive };
        scene.add(mesh);
        objects.push(mesh);
        selectObject(id);
        updateObjectCount();
      }

      function selectObject(id) {
        state.selectedId = id || '';
        objects.forEach((mesh) => {
          mesh.material.emissive = mesh.material.emissive || new THREE.Color(0x000000);
          mesh.material.emissive.set(mesh.userData.id === state.selectedId ? 0x203860 : 0x000000);
        });
      }

      function getSelectedObject() {
        return objects.find((item) => item.userData.id === state.selectedId) || null;
      }

      function pickObject(clientX, clientY) {
        const rect = renderer.domElement.getBoundingClientRect();
        pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        raycaster.setFromCamera(pointer, camera);
        const hit = raycaster.intersectObjects(objects, false)[0];
        return hit ? hit.object : null;
      }

      function deleteSelected() {
        const selected = getSelectedObject();
        if (!selected) return;
        scene.remove(selected);
        const idx = objects.findIndex((o) => o.userData.id === selected.userData.id);
        if (idx >= 0) objects.splice(idx, 1);
        selectObject('');
        updateObjectCount();
      }

      function duplicateSelected() {
        const selected = getSelectedObject();
        if (!selected) return;
        addObject({
          primitive: selected.userData.primitive,
          color: `#${selected.material.color.getHexString()}`,
          position: { x: selected.position.x + 0.6, y: selected.position.y, z: selected.position.z + 0.6 },
          rotation: selected.rotation,
          scale: selected.scale,
        });
      }

      function randomizeSelectedColor() {
        const selected = getSelectedObject();
        if (!selected) return;
        selected.material.color.set(Math.random() * 0xffffff);
      }

      function setLightingPreset(name) {
        if (name === 'sunset') {
          scene.background = new THREE.Color(0xfac08e);
          ambient.intensity = 0.6;
          sun.intensity = 0.9;
          sun.color.set(0xffb777);
        } else if (name === 'night') {
          scene.background = new THREE.Color(0x1a2745);
          ambient.intensity = 0.35;
          sun.intensity = 0.4;
          sun.color.set(0x90a8ff);
        } else {
          scene.background = new THREE.Color(0xd1e1ff);
          ambient.intensity = 0.75;
          sun.intensity = 1.1;
          sun.color.set(0xffffff);
        }
      }

      function focusSelected() {
        const selected = getSelectedObject();
        if (!selected) return;
        controls.target.copy(selected.position);
      }

      function autoArrange() {
        const radius = Math.max(2, objects.length * 0.35);
        objects.forEach((mesh, index) => {
          const t = (index / Math.max(1, objects.length)) * Math.PI * 2;
          mesh.position.set(Math.cos(t) * radius, 0.5, Math.sin(t) * radius);
        });
      }

      function serializeScene() {
        return {
          objects: objects.map((mesh) => ({
            id: mesh.userData.id,
            primitive: mesh.userData.primitive,
            color: `#${mesh.material.color.getHexString()}`,
            position: { x: mesh.position.x, y: mesh.position.y, z: mesh.position.z },
            rotation: { x: mesh.rotation.x, y: mesh.rotation.y, z: mesh.rotation.z },
            scale: { x: mesh.scale.x, y: mesh.scale.y, z: mesh.scale.z },
          })),
        };
      }

      function loadScene(data) {
        while (objects.length) {
          const obj = objects.pop();
          scene.remove(obj);
        }

        const list = Array.isArray(data?.objects) ? data.objects : [];
        list.forEach((item) => addObject(item));
        selectObject('');
        updateObjectCount();
      }

      async function saveGame() {
        try {
          setError('');
          const payload = {
            id: state.gameId,
            title: document.getElementById('titleInput').value || '',
            description: document.getElementById('descriptionInput').value || '',
            thumbnail: document.getElementById('thumbnailInput').value || '',
            isPublic: document.getElementById('publicCheckbox').checked,
            studioState: serializeScene(),
          };

          const endpoint = state.mode === 'edit' ? '/api/games/update' : '/api/games/create';
          const result = await fetchJSON(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          if (result?.game?.id) {
            state.mode = 'edit';
            state.gameId = result.game.id;
          }

          setStatus(result?.message || 'Game saved.');
        } catch (error) {
          setError(error.message);
        }
      }

      async function loadExistingGame(id) {
        const result = await fetchJSON(`/api/games/${encodeURIComponent(id)}`);
        if (!result || !result.game) return;
        if (!result.isCreator) throw new Error('Only creator can edit this game.');

        state.mode = 'edit';
        state.gameId = result.game.id;
        document.getElementById('titleInput').value = result.game.title || '';
        document.getElementById('descriptionInput').value = result.game.description || '';
        document.getElementById('thumbnailInput').value = result.game.thumbnail || '';
        document.getElementById('publicCheckbox').checked = Boolean(result.game.public);
        loadScene(result.game.studioState || { objects: [] });
      }

      function setupStudio() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd1e1ff);

        camera = new THREE.PerspectiveCamera(55, studio.clientWidth / studio.clientHeight, 0.1, 1000);
        camera.position.set(6, 5.5, 6.5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(studio.clientWidth, studio.clientHeight);
        studio.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0.8, 0);

        ambient = new THREE.AmbientLight(0xffffff, 0.75);
        scene.add(ambient);
        sun = new THREE.DirectionalLight(0xffffff, 1.1);
        sun.position.set(6, 10, 4);
        scene.add(sun);

        const ground = new THREE.Mesh(
          new THREE.PlaneGeometry(60, 60),
          new THREE.MeshStandardMaterial({ color: 0xbfd0ed, roughness: 0.9 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        raycaster = new THREE.Raycaster();
        pointer = new THREE.Vector2();

        renderer.domElement.addEventListener('pointerdown', (event) => {
          const picked = pickObject(event.clientX, event.clientY);
          if (picked) selectObject(picked.userData.id);
          state.dragging = true;
          state.dragStart = { x: event.clientX, y: event.clientY };
        });

        renderer.domElement.addEventListener('pointerup', () => {
          state.dragging = false;
          state.dragStart = null;
        });

        renderer.domElement.addEventListener('pointermove', (event) => {
          if (!state.dragging) return;
          const selected = getSelectedObject();
          if (!selected) return;

          const dx = (event.clientX - state.dragStart.x) * 0.01;
          const dy = (event.clientY - state.dragStart.y) * 0.01;
          state.dragStart = { x: event.clientX, y: event.clientY };

          if (state.activeTool === 'move') {
            selected.position.x += dx;
            selected.position.z += dy;
          } else if (state.activeTool === 'rotate') {
            selected.rotation.y += dx;
            selected.rotation.x += dy * 0.5;
          } else if (state.activeTool === 'scale') {
            const next = Math.max(0.2, selected.scale.x + dx);
            selected.scale.set(next, Math.max(0.2, selected.scale.y + dy), next);
          }
        });

        window.addEventListener('resize', () => {
          if (!renderer) return;
          camera.aspect = studio.clientWidth / studio.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(studio.clientWidth, studio.clientHeight);
        });
      }

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }

      document.querySelectorAll('[data-tool]').forEach((button) => {
        button.addEventListener('click', () => setTool(button.dataset.tool || 'select'));
      });

      document.getElementById('addObjectBtn').addEventListener('click', () => addObject());
      document.getElementById('deleteBtn').addEventListener('click', deleteSelected);
      document.getElementById('duplicateBtn').addEventListener('click', duplicateSelected);
      document.getElementById('randomColorBtn').addEventListener('click', randomizeSelectedColor);
      document.getElementById('lightingSelect').addEventListener('change', (event) => setLightingPreset(event.target.value));
      document.getElementById('focusBtn').addEventListener('click', focusSelected);
      document.getElementById('autoArrangeBtn').addEventListener('click', autoArrange);
      document.getElementById('saveGameBtn').addEventListener('click', saveGame);

      document.getElementById('saveDraftBtn').addEventListener('click', () => {
        localStorage.setItem(state.draftKey, JSON.stringify(serializeScene()));
        setStatus('Draft saved locally.');
      });
      document.getElementById('loadDraftBtn').addEventListener('click', () => {
        const raw = localStorage.getItem(state.draftKey);
        if (!raw) return setStatus('No local draft found.');
        try {
          loadScene(JSON.parse(raw));
          setStatus('Draft loaded.');
        } catch {
          setError('Draft is corrupted.');
        }
      });

      document.getElementById('dashboardBtn').addEventListener('click', () => { window.location.href = '/dashboard.html'; });
      document.getElementById('myGamesBtn').addEventListener('click', () => { window.location.href = '/my-games.html'; });

      async function init() {
        await fetchJSON('/api/me');
        setupStudio();

        const params = new URLSearchParams(window.location.search);
        const editId = params.get('id');
        if (editId) {
          await loadExistingGame(editId);
          setStatus('Loaded game for editing.');
        } else {
          addObject();
        }
      }

      init().catch((error) => setError(error.message));
      animate();
    </script>
  </body>
</html>
