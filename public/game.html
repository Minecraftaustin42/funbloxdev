<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Page - PlaySculpt</title>
    <style>
      body { margin:0; font-family:Verdana,sans-serif; background:#dce8ff; color:#1f2d46; }
      .wrap { max-width: 1100px; margin:0 auto; padding:14px; }
      .btn { border:1px solid #2e5cb0; background:linear-gradient(#75a0ef,#4f7fd9); color:#fff; padding:8px 12px; cursor:pointer; margin-right:6px; }
      .card { background:#f8fbff; border:1px solid #97add7; border-radius:4px; padding:12px; }
      #preview { width:100%; height:560px; border:1px solid #9db2dc; }
      .muted { color:#526188; font-size:13px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div style="margin-bottom:8px;">
        <button class="btn" id="dashboardBtn" type="button">Dashboard</button>
        <button class="btn" id="myGamesBtn" type="button">My Games</button>
      </div>

      <div id="errorBox" style="color:#8f1f1f"></div>
      <section class="card">
        <h2 id="titleText">Loading...</h2>
        <div id="metaText" class="muted"></div>
        <p id="descriptionText"></p>
        <div id="preview"></div>
      </section>
    </div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.162.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.162.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      const preview = document.getElementById('preview');
      let scene; let camera; let renderer; let controls;

      function setError(text) { document.getElementById('errorBox').textContent = text || ''; }
      async function fetchJSON(url) {
        const response = await fetch(url);
        const data = await response.json().catch(() => ({}));
        if (response.status === 401) { window.location.href = '/'; return null; }
        if (!response.ok) throw new Error(data.error || 'Request failed.');
        return data;
      }

      function makeGeometry(type) {
        if (type === 'sphere') return new THREE.SphereGeometry(0.5, 24, 24);
        if (type === 'cylinder') return new THREE.CylinderGeometry(0.45, 0.45, 1, 24);
        if (type === 'cone') return new THREE.ConeGeometry(0.5, 1, 20);
        if (type === 'torus') return new THREE.TorusGeometry(0.4, 0.16, 16, 40);
        return new THREE.BoxGeometry(1, 1, 1);
      }

      function initScene() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd5e3ff);
        camera = new THREE.PerspectiveCamera(55, preview.clientWidth / preview.clientHeight, 0.1, 1000);
        camera.position.set(7, 6, 7);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(preview.clientWidth, preview.clientHeight);
        preview.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.75));
        const dir = new THREE.DirectionalLight(0xffffff, 1.1);
        dir.position.set(8, 10, 6);
        scene.add(dir);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), new THREE.MeshStandardMaterial({ color: 0xc1d5f7, roughness: 0.9 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        window.addEventListener('resize', () => {
          if (!renderer) return;
          camera.aspect = preview.clientWidth / preview.clientHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(preview.clientWidth, preview.clientHeight);
        });
      }

      function renderStudio(state) {
        const objects = Array.isArray(state?.objects) ? state.objects : [];
        objects.forEach((obj) => {
          const mesh = new THREE.Mesh(
            makeGeometry(obj.primitive),
            new THREE.MeshStandardMaterial({ color: obj.color || '#4f7fd9' })
          );
          mesh.position.set(obj.position?.x || 0, obj.position?.y || 0.5, obj.position?.z || 0);
          mesh.rotation.set(obj.rotation?.x || 0, obj.rotation?.y || 0, obj.rotation?.z || 0);
          mesh.scale.set(obj.scale?.x || 1, obj.scale?.y || 1, obj.scale?.z || 1);
          scene.add(mesh);
        });
      }

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }

      async function init() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        if (!id) throw new Error('Missing game id in query string.');

        const data = await fetchJSON(`/api/games/${encodeURIComponent(id)}`);
        if (!data || !data.game) return;

        const game = data.game;
        document.getElementById('titleText').textContent = game.title || 'Untitled';
        document.getElementById('metaText').textContent = `Creator: ${game.creator || 'Unknown'} • Visits: ${game.visits ?? 0} • ${game.public ? 'Public' : 'Private'}`;
        document.getElementById('descriptionText').textContent = game.description || 'No description provided.';

        initScene();
        renderStudio(game.studioState || { objects: [] });
        animate();
      }

      document.getElementById('dashboardBtn').addEventListener('click', () => { window.location.href = '/dashboard.html'; });
      document.getElementById('myGamesBtn').addEventListener('click', () => { window.location.href = '/my-games.html'; });

      init().catch((error) => setError(error.message));
    </script>
  </body>
</html>
